name: CI

on:
  push:
    branches: [main, v10-dev]
  pull_request:
    branches: [main, v10-dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .

  sha-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify root SHA manifest discipline
        run: bash tools/tests/test_sha_manifest_discipline.sh

      - name: Verify UI SHA manifest discipline
        run: bash ui-v10/tests/test_sha_manifest_discipline.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      QT_QPA_PLATFORM: offscreen
      OLLAMA_KEEP_ALIVE: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ui-v10/requirements.txt', 'models/router/requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-rerunfailures
          if [ -f ui-v10/requirements.txt ]; then
            pip install -r ui-v10/requirements.txt
          fi
          if [ -f models/router/requirements.txt ]; then
            pip install -r models/router/requirements.txt
          fi
          pip install -e .

      - name: Run pytest suite
        run: |
          python -m pytest \
            -q \
            --ignore=tools/router_py/test_synthetic_adversarial.py \
            --ignore=tools/router_py/test_real_router_burn_in.py \
            --ignore=tools/tests/test_end_to_end_comprehensive.py \
            --deselect web_adapter/test_web_adapter.py::test_ask_integration_local \
            -W error::pytest.PytestReturnNotNoneWarning

  test-hmi-offscreen:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
      OLLAMA_KEEP_ALIVE: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ui-v10/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f ui-v10/requirements.txt ]; then
            pip install -r ui-v10/requirements.txt
          fi
          pip install -e .

      - name: Run HMI offscreen tests
        run: |
          cd ui-v10/tests
          cleanup_state() {
            NAMESPACE_ROOT="${LUCY_RUNTIME_NAMESPACE_ROOT:-$HOME/.codex-api-home/lucy/runtime-v10}"
            rm -f "$NAMESPACE_ROOT/state/request_history.jsonl"
            rm -f "$NAMESPACE_ROOT/state/last_request_result.json"
          }
          cleanup_state && python test_decision_trace_offscreen.py
          cleanup_state && python test_news_headline_punctuation_offscreen.py
          cleanup_state && python test_optional_missing_vs_corruption_offscreen.py
          cleanup_state && python test_scroll_preservation_offscreen.py
          cleanup_state && python test_voice_ptt_pause_removed_offscreen.py
          cleanup_state && python test_augmented_controls_offscreen.py
          pytest test_voice_ptt_state_machine.py -q
          python test_changes_verification.py
