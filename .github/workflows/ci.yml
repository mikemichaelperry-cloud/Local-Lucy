name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check tools/router_py/ models/router/ || true
          ruff check ui-v10/app/ || true

  test-router-py:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ui-v10/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f ui-v10/requirements.txt ]; then
            pip install -r ui-v10/requirements.txt
          fi

      - name: Run router_py tests
        run: |
          cd tools/router_py
          python -m pytest . -q --ignore=test_resource_leaks.py --ignore=test_e2e_hmi_voice.py

  test-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ui-v10/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f ui-v10/requirements.txt ]; then
            pip install -r ui-v10/requirements.txt
          fi

      - name: Run model tests
        run: |
          python -m pytest models/router/ -q

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ui-v10/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f ui-v10/requirements.txt ]; then
            pip install -r ui-v10/requirements.txt
          fi

      - name: Run E2E tests
        run: |
          cd tools/tests
          python -m pytest test_end_to_end_comprehensive.py -q || true

  # ---------------------------------------------------------------------------
  # HMI offscreen tests — PySide6 headless GUI validation
  # QT_QPA_PLATFORM=offscreen is set at the job level so all Qt widgets
  # render to a dummy surface. Individual tests also set it as a safety net.
  # ---------------------------------------------------------------------------
  test-hmi-offscreen:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('ui-v10/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f ui-v10/requirements.txt ]; then
            pip install -r ui-v10/requirements.txt
          fi

      - name: Run HMI offscreen tests
        run: |
          cd ui-v10/tests
          # Clear shared state files between tests to prevent cross-test contamination
          # (some offscreen tests write to the runtime state directory)
          cleanup_state() {
            rm -f ~/.codex-api-home/lucy/runtime-v10/state/request_history.jsonl
            rm -f ~/.codex-api-home/lucy/runtime-v10/state/last_request_result.json
          }
          # Standalone offscreen scripts (each exits 0 on success)
          # Decision trace must run before augmented_controls to avoid state pollution
          cleanup_state && python test_decision_trace_offscreen.py
          cleanup_state && python test_news_headline_punctuation_offscreen.py
          cleanup_state && python test_optional_missing_vs_corruption_offscreen.py
          cleanup_state && python test_scroll_preservation_offscreen.py
          cleanup_state && python test_voice_ptt_pause_removed_offscreen.py
          cleanup_state && python test_augmented_controls_offscreen.py
          # PySide6 unittest-based tests
          pytest test_voice_ptt_state_machine.py -q
          # Changes verification (standalone script)
          python test_changes_verification.py
