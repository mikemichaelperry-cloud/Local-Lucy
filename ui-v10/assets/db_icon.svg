<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <!-- Cylinder body gradient -->
    <linearGradient id="cylBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="30%" stop-color="#00f5d4"/>
      <stop offset="70%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00997a"/>
    </linearGradient>
    <!-- Top cap gradient -->
    <linearGradient id="cylTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80ffea"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <!-- Glowing edge -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner highlight -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGlow)" stroke="#00d4aa" stroke-width="2" opacity="0.6"/>

  <!-- Database cylinder -->
  <g transform="translate(128, 128)">
    <!-- Bottom ellipse shadow -->
    <ellipse cx="0" cy="52" rx="52" ry="18" fill="#00d4aa" opacity="0.15"/>

    <!-- Cylinder body -->
    <path d="M -52,-30 L -52,45 A 52,18 0 0,0 52,45 L 52,-30 A 52,18 0 0,1 -52,-30 Z" fill="url(#cylBody)"/>

    <!-- Horizontal bands / disk platters -->
    <ellipse cx="0" cy="-5" rx="52" ry="18" fill="none" stroke="#00f5d4" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="0" cy="20" rx="52" ry="18" fill="none" stroke="#00f5d4" stroke-width="1.5" opacity="0.4"/>

    <!-- Top cap -->
    <ellipse cx="0" cy="-30" rx="52" ry="18" fill="url(#cylTop)" filter="url(#glow)"/>

    <!-- Top cap inner highlight -->
    <ellipse cx="0" cy="-30" rx="52" ry="18" fill="url(#highlight)"/>

    <!-- Top cap bright edge -->
    <ellipse cx="0" cy="-30" rx="52" ry="18" fill="none" stroke="#80ffea" stroke-width="2" opacity="0.8"/>

    <!-- Vertical highlight streak -->
    <path d="M -35,-28 L -35,43 A 35,12 0 0,0 -20,46 L -20,-25 A 35,12 0 0,1 -35,-28 Z" fill="white" opacity="0.12"/>

    <!-- Lucy "L" accent -->
    <text x="0" y="58" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#00f5d4" opacity="0.9">L10</text>
  </g>

  <!-- Orbiting particles -->
  <circle cx="210" cy="70" r="3" fill="#00f5d4" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="190" r="2" fill="#00d4aa" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="195" cy="195" r="2.5" fill="#80ffea" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>