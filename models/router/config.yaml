# ModernBERT Router Configuration
model:
  base_model: "answerdotai/ModernBERT-base"
  max_length: 256
  dropout: 0.1
  num_intent_classes: 9
  num_evidence_classes: 3
  num_route_classes: 6
  num_policy_classes: 4

intent_classes:
  - local_answer
  - background_overview
  - current_evidence
  - clarification
  - technical_explanation
  - creative_writing
  - medical_inquiry
  - news_request
  - time_query

evidence_classes:
  - not_required
  - required
  - uncertain

route_classes:
  - LOCAL
  - LOCAL_WITH_FALLBACK
  - AUGMENTED
  - NEWS
  - TIME
  - CLARIFY

policy_classes:
  - none
  - disabled
  - fallback_only
  - force_augmented

training:
  batch_size: 32
  epochs: 10
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  label_smoothing: 0.05
  gradient_accumulation_steps: 2
  seed: 42
  
data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  synthetic_ratio: 0.6
  min_samples_per_class: 50
  
calibration:
  method: "temperature_scaling"
  val_temperature_search_range: [0.5, 3.0]
  target_ece: 0.05

inference:
  confidence_threshold: 0.75
  high_confidence_threshold: 0.90
  device: "cpu"
