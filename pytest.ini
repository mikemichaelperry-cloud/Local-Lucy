[pytest]
filterwarnings =
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore::ResourceWarning:asyncio.base_events
    ignore::ResourceWarning:pytest.unraisableexception

# Fast CI batch: exclude 1,065-test synthetic adversarial burn-in suite.
# Run explicitly: pytest tools/router_py/test_synthetic_adversarial.py
addopts =
    --ignore=tools/router_py/test_synthetic_adversarial.py
